
<style>
  .preview-wrap {
    background: #fbfbfd;
    border-radius: 16px;
    border: 0.5px solid var(--border);
    min-height: 480px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .rm-main { text-align: center; width: 100%; max-width: 480px; animation: up 0.7s cubic-bezier(.22,1,.36,1) both; }
  @keyframes up { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .rm-eye { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #0071e3; margin-bottom: 14px; }
  .rm-h1 { font-size: clamp(52px,10vw,80px); font-weight: 700; letter-spacing: -0.045em; line-height: 1; color: #1d1d1f; margin-bottom: 14px; }
  .rm-sub { font-size: 17px; line-height: 1.6; color: #6e6e73; margin-bottom: 44px; }
  .rm-wrap { max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
  .rm-input {
    width: 100%; height: 52px; padding: 0 18px;
    font-size: 16px; font-family: inherit;
    background: #f0f0f5; border: 1.5px solid transparent;
    border-radius: 12px; color: #1d1d1f; outline: none;
    transition: all 0.2s;
    cursor: text;
  }
  .rm-input::placeholder { color: #b0b0b8; }
  .rm-input:focus { background: #fff; border-color: #0071e3; box-shadow: 0 0 0 4px rgba(0,113,227,.12); }
  .rm-btn {
    width: 100%; height: 52px;
    background: #1d1d1f; color: #fff; border: none;
    border-radius: 12px; font-size: 16px; font-weight: 500; font-family: inherit;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.18s, transform 0.1s;
  }
  .rm-btn:hover { background: #3a3a3c; }
  .rm-btn:active { transform: scale(0.98); }
  .rm-btn.loading { background: #aeaeb2; cursor: not-allowed; }
  .rm-sp {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.25); border-top-color: #fff;
    border-radius: 50%; animation: spin .65s linear infinite; display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .rm-st { margin-top: 18px; font-size: 14px; color: #aeaeb2; min-height: 20px; }
  .rm-st.ok  { color: #34c759; }
  .rm-st.err { color: #ff3b30; }
</style>

<div class="preview-wrap">
  <div class="rm-main">
    <p class="rm-eye">SoundCloud</p>
    <h1 class="rm-h1">r&#8209;m.</h1>
    <p class="rm-sub">Napiš název skladby.<br>Stáhni jako MP3.</p>
    <div class="rm-wrap">
      <input class="rm-input" id="qi" type="text" placeholder="daft punk get lucky…" autocomplete="off" spellcheck="false">
      <button class="rm-btn" id="bi" onclick="go()">
        <div class="rm-sp" id="spi"></div>
        <span id="li">Stáhnout</span>
      </button>
    </div>
    <p class="rm-st" id="sti"></p>
  </div>
</div>

<script>
document.getElementById('qi').addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
function go() {
  const q = document.getElementById('qi').value.trim();
  if (!q) { document.getElementById('qi').focus(); return; }
  const btn = document.getElementById('bi');
  const sp = document.getElementById('spi');
  const lbl = document.getElementById('li');
  const st = document.getElementById('sti');
  btn.classList.add('loading');
  sp.style.display = 'block';
  lbl.textContent = 'Hledám…';
  st.className = 'rm-st';
  st.textContent = 'Může to trvat 20–40 sekund…';
  setTimeout(() => {
    sp.style.display = 'none';
    btn.classList.remove('loading');
    lbl.textContent = 'Stáhnout';
    st.className = 'rm-st ok';
    st.textContent = '✓ Hotovo! Skladba je stažená.';
    document.getElementById('qi').value = '';
    setTimeout(() => { st.textContent = ''; st.className = 'rm-st'; }, 4000);
  }, 2200);
}
</script>
